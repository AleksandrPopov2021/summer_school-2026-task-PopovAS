services:
  postgres:
    image: postgres:16-alpine
    container_name: vertical-postgres
    environment:
      POSTGRES_USER: vertical
      POSTGRES_PASSWORD: vertical
      POSTGRES_DB: vertical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertical -d vertical"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
